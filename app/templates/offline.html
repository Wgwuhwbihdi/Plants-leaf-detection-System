{% extends 'base.html' %}

{% block title %}Offline - Phyto Lab{% endblock %}

{% block content %}
<main class="flex items-center justify-center min-h-screen font-['Manrope'] text-center pt-24 bg-surface-container-lowest">
    <div class="max-w-md w-full bg-surface-container-low p-8 rounded-3xl shadow-sm border border-outline-variant/30">
        <div class="mb-6 flex justify-center">
            <span class="material-symbols-outlined text-outline text-9xl" style="font-size: 80px;">wifi_off</span>
        </div>
        <h2 class="text-3xl font-extrabold text-on-surface mb-2">You're Offline</h2>
        <p class="text-on-surface-variant mb-2">It looks like you're not connected to the internet. Some features may not be available.</p>
        <p class="text-outline text-sm mb-8">Please check your connection and try again.</p>
        <button onclick="window.location.reload()" class="bg-primary hover:bg-primary-container text-on-primary font-bold py-3 px-8 rounded-full transition-colors inline-block tracking-wide w-full">
            Retry Connection
        </button>
    </div>
</main>
{% endblock %}
