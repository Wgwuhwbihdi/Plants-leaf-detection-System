<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <meta name="theme-color" content="#4a7c59"/>
    <link rel="manifest" href="/static/manifest.json"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
    <meta name="apple-mobile-web-app-title" content="Phyto Lab"/>
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png"/>
    <title>{% block title %}Terra | Phyto Lab{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="/static/icons/icon.svg">
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Literata:opsz,wght@7..72,400..800&family=Nunito+Sans:opsz,wght@6..12,400..700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    {% include "partials/head_scripts.html" %}
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { 
            font-family: theme('fontFamily.body'); 
            background-color: theme('colors.background'); 
        }
        
        /* Glass panel utility used across multiple pages */
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px)
        }
        
        {% block extra_css %}{% endblock %}
    </style>
</head>
<body class="min-h-screen text-on-background relative pb-24 md:pb-0 flex flex-col">
    
    {% block texture_overlay %}
    <div class="fixed inset-0 z-[-1] opacity-[0.08] pointer-events-none mix-blend-multiply" style="background-image: url('/static/images/terra_texture.png'); background-size: 300px; background-repeat: repeat;"></div>
    {% endblock %}
    
    <!-- Navigation Components (Top, Side, Bottom) -->
    {% include "partials/navbar.html" %}

    <div class="flex flex-1">
        <!-- Main Content Area -->
        <main id="main-content" class="w-full mx-auto px-4 md:px-8 py-12 md:ml-[250px] flex-1 transition-all duration-300">
            {% block content %}
            {% endblock %}
        </main>
    </div>

    <!-- Footer Component -->
    {% include "partials/footer.html" %}

    <!-- Global App Javascript -->
    <script src="/static/js/app.js"></script>
    
    {% include 'partials/google_translate.html' %}
    
    {% block extra_js %}{% endblock %}
</body>
</html>
